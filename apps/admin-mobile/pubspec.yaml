name: goc_nha_minh_admin
description: Admin app for Góc Nhà Mình Digital Ecosystem.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Routing
  go_router: ^14.2.7

  # Firebase Auth
  firebase_core: ^3.5.0
  firebase_auth: ^5.2.0

  # HTTP
  dio: ^5.7.0

  # Local storage
  shared_preferences: ^2.3.2

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  dartz: ^0.10.1
  get_it: ^8.0.0
  flutter_secure_storage: ^9.2.2

  # Image picker
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
